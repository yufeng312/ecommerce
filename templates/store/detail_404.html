{% extends "../base.html" %}
{% block title %}商品不可用 - 吃糖网{% endblock %}
{% block header %}{% endblock %}

{% block content %}
<section class="py-5 my-auto">
  <div class="container px-4 px-lg-5 text-center my-5">
    <div class="mb-4">
      <i class="bi bi-box-seam text-secondary" style="font-size: 4.5rem;"></i>
    </div>
    <h2 class="fw-bold mb-3">商品暂时缺货或已下架</h2>
    <p class="text-secondary mb-4 fs-6">
      抱歉，您查看的商品目前无货或暂时无法购买，去逛逛其他优质商品吧！
    </p>
    <div class="d-flex justify-content-center gap-3">
      <a href="{% url 'store:index' %}" class="btn btn-dark px-4 py-2">
        <i class="bi bi-house-door me-1"></i>返回首页
      </a>
      <button onclick="history.back()" class="btn btn-outline-dark px-4 py-2">
        <i class="bi bi-arrow-left me-1"></i>返回上一页
      </button>
    </div>
  </div>
</section>
{% endblock content %}

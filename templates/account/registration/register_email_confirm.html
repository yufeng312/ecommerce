{% extends "../../base.html" %}
{% block title %}请激活您的账号 - 吃糖网{% endblock %}
{% block header %}{% endblock  %}

{% block content %}
<section class="py-5 my-auto">
  <div class="container px-4 px-lg-5 text-center my-5" style="max-width: 600px;">
    <div class="mb-4">
      <i class="bi bi-envelope-check text-dark" style="font-size: 4.5rem;"></i>
    </div>
    <h2 class="fw-bold mb-3">账号注册成功！</h2>
    <p class="text-secondary mb-2 fs-6">
      激活邮件已发送至您的邮箱：
    </p>
    <p class="fw-bold text-dark fs-5 mb-4">
      {{ email }}
    </p>
    <p class="text-muted small mb-4">
    </p>
    <div class="d-flex justify-content-center gap-3">
      <a href="{% url 'store:index' %}" class="btn btn-dark px-4 py-2">
        <i class="bi bi-house-door me-1"></i>返回首页
      </a>
      <a href="{% url 'account:login' %}" class="btn btn-outline-dark px-4 py-2">
        去登录<i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>
  </div>
</section>
{% endblock content %}

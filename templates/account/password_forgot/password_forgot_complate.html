{% extends "../../base.html" %}
{% block title %}密码修改成功 - 吃糖网{% endblock %}
{% block header_title %}密码重置成功{% endblock %}

{% block content %}
<section class="py-5 bg-light flex-grow-1 d-flex align-items-center">
    <div class="container text-center" style="max-width: 550px">
        <div class="card border-1 shadow-sm p-4 p-md-5 bg-white">
            <div class="mb-4"><i class="bi-check-circle-fill text-success" style="font-size: 3.5rem;"></i></div>
            <h3 class="fw-bolder h4 text-dark mb-2">新密码已生效</h3>
            <p class="text-muted small mb-4">您的新密码已成功写入吃糖网安全数据库，您现在可以重新登录您的账户了。</p>
            <a href="{% url 'account:login' %}" class="btn btn-dark py-2 fw-bold w-100">
                <i class="bi-box-arrow-in-right me-1"></i> 立即前往登录
            </a>
        </div>
    </div>
</section>
{% endblock %}

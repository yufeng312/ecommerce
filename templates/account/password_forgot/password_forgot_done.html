{% extends "../../base.html" %}
{% block title %}邮件已发送 - 吃糖网{% endblock %}
{% block header_title %}请查收邮件{% endblock %}
{% block header_subtitle %}安全指令已下发至您的信箱{% endblock %}


{% block content %}
<section class="py-5 bg-light flex-grow-1 d-flex align-items-center">
    <div class="container text-center" style="max-width: 550px">
        <div class="card border-1 shadow-sm p-4 p-md-5 bg-white">
            <div class="mb-4"><i class="bi-envelope-check text-success" style="font-size: 3.5rem;"></i></div>
            <h3 class="fw-bolder h4 text-dark mb-2">重置邮件已发送</h3>
            <p class="text-muted small mb-4">我们已向您的电子邮箱发送了后续操作向导，请尽快查收并完成密码变更。</p>
            <div class="alert alert-secondary border-0 small bg-light text-start mb-0">
                <i class="bi-info-circle me-1"></i> 提示：若长时间未收到，请检查邮件是否被拦截到垃圾箱中。
            </div>
        </div>
    </div>
</section>
{% endblock %}

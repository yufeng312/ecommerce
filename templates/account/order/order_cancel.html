{% extends "../../store/base.html" %}
{% load static %}
{% block title %}订单取消成功 - 吃糖网{% endblock %}

{% block content %}
<div class="container py-5 my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="mb-4 text-success">
                <i class="bi bi-check-circle-fill" style="font-size: 5rem;"></i>
            </div>
            
            <h2 class="fw-bold mb-3">订单取消成功</h2>
            <p class="text-secondary mb-4">您的订单（单号：{{ order_sn }}）已安全取消，所购商品库存已为您实时退回。</p>
            
            <div class="alert alert-light border rounded mb-4 shadow-sm py-3">
                <span class="fw-bold text-danger" id="countdown">5</span> 秒后系统将自动为您跳转至商城首页...
            </div>
            
            <a href="{% url 'store:index' %}" class="btn btn-dark px-4 py-2 fw-bold shadow-sm">
                <i class="bi bi-house-door-fill me-2"></i>立即返回首页
            </a>
        </div>
    </div>
</div>

<script>
    let timeLeft = 5;
    const countdownElement = document.getElementById('countdown');

    const timer = setInterval(() => {
        timeLeft--;
        countdownElement.innerText = timeLeft; 

        if (timeLeft <= 0) {
            clearInterval(timer);
            window.location.href = "{% url 'store:index' %}"; 
        }
    }, 1000);
</script>
{% endblock content %}
